# Workshop-level text. Edit here, not in templates.

summary: >
  This workshop explores systems and infrastructure for Distributed Quantum
  Computing (DQC), with an emphasis on how coordinated design enables scalable
  multi-QPU execution. Attendees will gain insights into integrating physical,
  network, system, and application layers to improve scalability, reliability,
  and overall efficiency in DQC.

abstract: >
  As quantum computing systems continue to scale, DQC has emerged as a promising
  paradigm to overcome the limitations of individual quantum processors. In DQC,
  multiple quantum processing units (QPUs) are interconnected through quantum
  networks, enabling them to collaboratively execute computational tasks that
  exceed the capabilities of a single device. This shift from isolated processors
  to interconnected systems represents a fundamental step toward scalable quantum
  computing.
  However, current approaches largely treat system layers in isolation, separating
  physical-layer constraints, network protocols, and application-level execution,
  which leads to inefficiencies in scalability and reliability. As quantum systems
  grow in size and complexity, these limitations become increasingly significant.
  This workshop focuses on system and infrastructure design for DQC, highlighting
  coordinated design across physical, network, system, and application layers. By
  explicitly connecting these layers, cross-layer approaches can capture the
  interplay between hardware limitations, communication processes, and application
  requirements, enabling more efficient and scalable system designs.

objectives: >
  The workshop focuses on advancing cross-layer infrastructure for distributed
  quantum computing (DQC) by bringing together researchers from quantum computing,
  networking, systems, and applications. Through talks and discussions, it will
  highlight key challenges, emerging solutions, and state-of-the-art approaches
  for scalable quantum systems, while fostering interdisciplinary collaboration
  and community building around shared frameworks, benchmarks, research
  directions, and future collaborative efforts in DQC.
target_audience: >
  Researchers and practitioners in quantum computing, quantum networking, computer
  systems, and applications — particularly those interested in scalable and
  distributed quantum infrastructures. Also relevant to researchers in computer
  architecture, distributed systems, and high-performance computing exploring the
  integration of quantum technologies into larger computing ecosystems.
  Attendees are expected to have a basic understanding of quantum computing concepts;
  expertise in specific subfields (e.g., networking or systems) is not required.

cross_layer_perspective:
  - layer: "Physical"
    text: "Qubit interconnects, photonic links, and the device characteristics that bound multi-QPU computation."
  - layer: "Network"
    text: "Entanglement routing, network topologies, and resource management for the quantum links that bind QPUs together."
  - layer: "System"
    text: "Distributed compilers, runtimes, and middleware. Network-aware circuit partitioning and execution orchestration."
  - layer: "Application"
    text: "Hybrid quantum-classical distributed systems and co-design opportunities driven by application requirements."

