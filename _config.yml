# DQC-SI Workshop site configuration
# To create a new year's site:
#   1. Copy _data/* to _data/archive/YYYY/  (or rename the whole directory tree).
#   2. Update the values below + _data/*.yml for the new year.

title: "DQC-SI Workshop"
year: 2026
short_name: "DQC-SI"
full_name: "Distributed Quantum Computing Systems and Infrastructure"
tagline: "Distributed Quantum Computing Systems and Infrastructure"
host_conference: "IEEE Quantum Week (QCE 2026)"
host_conference_url: "https://qce.quantum.ieee.org"
url: "https://dqc-si.com"
baseurl: ""

# Submission system
submission_url: "https://easychair.org/conferences2/submissions?a=36846799"
main_contact_email: "yangz@fau.edu"

# Build settings — GitHub Pages safe set
markdown: kramdown
plugins: []
include:
  - assets

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - 2026_Workshop_DQC_SI.pdf
  - vendor
  - node_modules
